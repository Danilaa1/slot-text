name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run check

      - name: Run tests
        run: npm run test
